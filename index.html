    .falling-sparks {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5; pointer-events: none; overflow: hidden;
      }
      .spark {
        position: absolute; top: -100px; width: 2px; height: 40px;
        border-radius: 50%; animation: rainDrop linear infinite;
      }
      .spark.cyan { background: var(--white); box-shadow: 0 0 8px var(--white); }
      .spark.green { background: var(--red); box-shadow: 0 0 8px var(--red); }
      @keyframes rainDrop {
        0% { transform: translateY(-100px); opacity: 0; }
        10% { opacity: 1; height: 50px; }
        90% { opacity: 1; height: 30px; }
        100% { transform: translateY(100vh); opacity: 0; }
      }
      .spark:nth-child(1) { left: 5%; animation-duration: 2.2s; animation-delay: 0.1s; }
      .spark:nth-child(2) { left: 15%; animation-duration: 2.8s; animation-delay: 1.2s; }
      .spark:nth-child(3) { left: 25%; animation-duration: 2.0s; animation-delay: 0.5s; }
      .spark:nth-child(4) { left: 35%; animation-duration: 3.1s; animation-delay: 1.8s; }
      .spark:nth-child(5) { left: 45%; animation-duration: 2.5s; animation-delay: 0.8s; }
      .spark:nth-child(6) { left: 55%; animation-duration: 3.5s; animation-delay: 0.5s; }
      .spark:nth-child(7) { left: 65%; animation-duration: 2.4s; animation-delay: 2.3s; }
      .spark:nth-child(8) { left: 75%; animation-duration: 2.3s; animation-delay: 1.3s; }
      .spark:nth-child(9) { left: 85%; animation-duration: 2.6s; animation-delay: 2.3s; }
      .spark:nth-child(10) { left: 95%; animation-duration: 2.2s; animation-delay: 1.3s; }

    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.12); }
        100% { transform: scale(1); }
    }
    .chevron {
        position: absolute;
        width: 18px;
        height: 18px;
        border-right: 5px solid var(--red);
        border-bottom: 5px solid var(--red);
        transform: rotate(-45deg);
        opacity: 0;
        animation: slide 1s infinite;
        filter: drop-shadow(0 0 5px var(--gold));
    }

    /* posisi + delay biar beruntun */
    .c1 { right: 80px; bottom: 15px; animation-delay: 0.3s; }
    .c2 { right: 95px; bottom: 15px; animation-delay: 0.2s; }
    .c3 { right: 110px; bottom: 15px; animation-delay: 0.1s; }


    @keyframes slide {
        0% {
            transform: translateX(-10px) rotate(-45deg);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateX(10px) rotate(-45deg);
            opacity: 0;
        }
    }
    .dhevron {
        position: absolute;
        width: 18px;
        height: 18px;
        border-right: 5px solid var(--red);
        border-bottom: 5px solid var(--red);
        transform: rotate(45deg);
        opacity: 0;
        animation: slideDown 1s infinite;
        filter: drop-shadow(0 0 5px var(--gold));
    }
    .d6 { right: 18px; bottom: 80px; animation-delay: 0.3s; }
    .d7 { right: 18px; bottom: 95px; animation-delay: 0.2s; }
    .d8 { right: 18px; bottom: 110px; animation-delay: 0.1s; }

    /* animasi turun ke arah tombol */

        }
